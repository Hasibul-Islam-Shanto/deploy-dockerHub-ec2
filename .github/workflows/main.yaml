name: CI/CD for Flask App

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-attendance-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-attendance-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to AWS EC2
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${{ secrets.AWS_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          ssh -o StrictHostKeyChecking=no -i private_key.pem \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} "mkdir -p ~/app"

          scp -o StrictHostKeyChecking=no -i private_key.pem docker-compose.prod.yml \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:~/app/docker-compose.yml

          ssh -o StrictHostKeyChecking=no -i private_key.pem \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << EOF
            cd ~/app
            echo "DOCKER_USERNAME=${DOCKER_USERNAME}" > .env
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            docker compose pull web
            docker compose up -d
          EOF
